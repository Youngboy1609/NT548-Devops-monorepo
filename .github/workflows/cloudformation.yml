name: CloudFormation CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "infra/cloudformation/**"
      - ".github/workflows/cloudformation.yml"
      - ".checkov.yml"
  push:
    paths:
      - "infra/cloudformation/**"
      - ".github/workflows/cloudformation.yml"
      - ".checkov.yml"

permissions:
  contents: read

jobs:
  cloudformation:
    name: cfn-lint, taskcat, and Checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CloudFormation tools
        run: python -m pip install --upgrade pip "setuptools<81" "cfn-lint==1.38.2" "taskcat==0.9.57" "checkov==3.2.527"

      - name: cfn-lint
        run: cfn-lint --non-zero-exit-code error infra/cloudformation/templates/*.yaml

      - name: taskcat lint
        run: taskcat lint -p infra/cloudformation

      - name: Checkov CloudFormation
        run: checkov --framework cloudformation --config-file .checkov.yml
